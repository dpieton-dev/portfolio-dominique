<section id="projects" class="container mx-auto px-6 py-20">
  <h2 class="text-4xl font-bold text-center mb-16">{{ langService.t.projects }}</h2>
  <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
    @for (project of projects; track project.title) {
      <div class="theme-card rounded-2xl overflow-hidden shadow-lg hover:scale-105 hover:-translate-y-2 transition duration-300">
        <div class="h-48 flex items-center justify-center" [class]="project.color">
          <span class="text-2xl font-bold text-white">{{ project.title }}</span>
        </div>
        <div class="p-6">
          <p class="theme-muted mb-6">{{ langService.currentLang() === 'fr' ? project.descriptionFr : project.descriptionEn }}</p>
          <div class="flex flex-wrap gap-2 mb-6">
            @for (tech of project.technologies; track tech) {
              <span class="bg-cyan-500 text-black px-3 py-1 rounded-full text-sm">{{ tech }}</span>
            }
          </div>
          <button class="bg-cyan-500 hover:bg-cyan-400 text-black px-5 py-2 rounded-xl font-semibold transition">{{ langService.t.viewProject }}</button>
        </div>
      </div>
    }
  </div>
</section>
