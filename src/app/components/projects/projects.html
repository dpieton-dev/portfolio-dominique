<section id="projects" class="container mx-auto px-6 py-20">

  <!-- Titre -->
  <h2 class="text-4xl font-bold text-center mb-16">

    Featured Projects

  </h2>
  <!-- ========================= -->
<!-- PROJECTS GRID -->
<!-- ========================= -->
<div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">

  <!--
    Angular 21 @for
    Génère automatiquement les projets
  -->
  @for (project of projects; track project.title) {

    <!-- Card projet -->
    <div
      class="bg-slate-900 rounded-2xl overflow-hidden shadow-lg hover:scale-105 hover:-translate-y-2 transition duration-300"
    >

      <!-- Header couleur dynamique -->
      <div
        class="h-48 flex items-center justify-center"
        [class]="project.color"
      >

        <span class="text-2xl font-bold text-white">

          {{ project.title }}

        </span>

      </div>

      <!-- Contenu -->
      <div class="p-6">

        <!-- Description -->
        <p class="text-slate-400 mb-6">

          {{ project.description }}

        </p>

        <!-- Technologies -->
        <div class="flex flex-wrap gap-2 mb-6">

          <!-- Technologies dynamiques -->
          @for (tech of project.technologies; track tech) {

            <span
              class="bg-cyan-500 text-black px-3 py-1 rounded-full text-sm"
            >

              {{ tech }}

            </span>

          }

        </div>

        <!-- Bouton -->
        <button
          class="bg-cyan-500 hover:bg-cyan-400 text-black px-5 py-2 rounded-xl font-semibold transition"
        >

          View Project

        </button>

      </div>

    </div>

  }

</div>
  

    

</section>
